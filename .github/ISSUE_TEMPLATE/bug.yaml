name: Report a bug
description: Reporting problems with the APP
title: "[Bug]: "
labels: ["bug🐞"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem, please complete the title and fill in the following information.
        
        感謝您的回報，請先填寫完整標題，再補充以下資訊。
        
        **Please do not report config-file/comic-source script issues in this repository.**
        
        **請不要在此儲存庫回報 config/comic source 腳本相關問題。**
        
        This project is a comic reader that allows users to write their own config files, and there is no built-in comic source.
        
        本專案是漫畫閱讀器，允許使用者自行撰寫設定檔，且沒有內建漫畫來源。

        Config / comic source issues should be reported to:
        https://github.com/venera-app/venera-configs/issues
  - type: dropdown
    id: bugType
    attributes:
      label: Bug type
      description: What type of bug are you reporting?
      options:
        - Crash
        - UI
        - Performance
        - Security
        - Reader
        - JS Engine
        - Comic Source
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Description
      description: Describe the problem
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: | 
        App version.
        
        Please try to update if it is not the latest version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      multiple: true
      options:
        - Android
        - iOS
        - Windows
        - macOS
        - linux
        - other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: logs
  - type: textarea
    id: screenshotOrVideo
    attributes:
      label: Screenshot or video
      description: Upload relevant screenshots or videos here
