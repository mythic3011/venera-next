name: Check Issue

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-check-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Check Issue
        id: check
        uses: wgh136/gpt_issue_checker@v1.0.2
        with:
          api-url: ${{ secrets.API_URL }}
          api-key: ${{ secrets.API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "You are the repository issue checker for this comic app. Follow the repository contribution policy: accept reproducible bug reports, concrete implementation proposals, or pull requests; close low-effort complaints, vague wishes, repeated requests, and requests that only say what they want without explaining behavior. The app supports local and network comics, but comic source config files are maintained in a separate repository and issues about source config files should be closed here. A valid bug report should include current behavior, expected behavior, reproduction steps, platform and app version or commit, logs or screenshots or diagnostics, and the affected area. You are given an issue body and must decide whether to close it. If you close it, explain why in the comment. If you keep it open, summarize the actionable request in the comment. Respond with a JSON object with the keys should_close, should_comment, comment."
          model: "gpt-4o"
